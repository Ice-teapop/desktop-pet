# systemd-journald drop-in —— 限制 prod 持久日志大小
#
# 安装到：/etc/systemd/journald.conf.d/deskpet.conf
# 生效命令：systemctl restart systemd-journald
#
# 背景：deskpet-prod 是 2GB 机器 / ~25GB 磁盘，journald 默认无总大小上限 ——
# 长期运行后日志会无声增长。本项目「不留存」纪律已经把 access log 关了，
# 残留的 journal 主要是 systemd / kernel / 启动信息。设硬上限避免无限增长。
#
# 大小估算：vision-service 每分钟 < 1 行日志（请求级别 OFF，只在 startup +
# 错误时写），Caddy 类似（access log discard）。200M 够撑数月。

[Journal]
# 持久 journal 总大小上限。超过自动滚动（旧的删掉）
SystemMaxUse=200M
# 单个 journal 文件最大；触发后开新文件
SystemMaxFileSize=20M
# 至少保留多少（防 SystemMaxUse 滚动滚太狠）—— 不设默认 = 全部受 MaxUse 管
# SystemKeepFree=100M

# Runtime journal（内存 /run/log/journal）也设上限
RuntimeMaxUse=50M
