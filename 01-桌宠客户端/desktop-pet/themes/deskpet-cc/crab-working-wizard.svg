<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-working-wizard.svg  ·  DeskPet wizard + 魔法帽事故 sequence
  ──────────────────────────────────────────────────────────────
  · idle 同款 5 通道异步动画 (breathe / sway / shadow / claw-bob / leg-step / hat-tilt / blink)
  · 一次性 hat-drop（落到头上后永远稳定）
  · 4.6s 魔法事故 sequence（4 专家联合方案）：
      A. 帽诡异胀大 → 盖住整个 clawd
      B. clawd 在帽里挣扎 (高频 shake + 缩头)
      C. 帽收缩回正常 (带反向 undershoot 弹簧)
      D. 双眼发晕 720° 打转 (= 视觉等价 0°)
      E. 大眨眼 + 傲娇 1° rotate 收尾
  · B 类回归型：0% = 100% (idle 稳态)
  · 预览模式：accident animation 跑 1 次, 总长 4.6s
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-7.5 -7.5 45 45"
     shape-rendering="crispEdges">

  <title>crab-working-wizard</title>

  <style>
    /* ==================== idle 通道 ==================== */
    .body-breathe { animation: crab-breathe 4.8s ease-in-out infinite; transform-origin: 15px 18px; }
    @keyframes crab-breathe {
      0%   { transform: translateY(0)    scaleY(1);    }
      30%  { transform: translateY(-1px) scaleY(1.04); }
      45%  { transform: translateY(-1px) scaleY(1.04); }
      100% { transform: translateY(0)    scaleY(1);    }
    }
    .body-sway { animation: crab-sway 6.7s ease-in-out infinite; transform-origin: 15px 18px; }
    @keyframes crab-sway {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-0.3px); }
      75%      { transform: translateX(0.3px); }
    }
    /* 注意: 不能给 #shadow-js 加 animation —— CSS animation 跟 App.tsx rAF
       inline style.transform 同 property 抢占, animation 永远赢, 让 cursor
       跟随 + 呼吸全静默. shadow breathe 由 App.tsx rAF 内 sin 波 inline 写入.
       transform-box: fill-box 让 origin 锚到 rect bbox 中心, 避开 outer
       .pet-scale-wrap scale(0.7) 对 origin 不共变导致的 scaleX 中心漂移. */
    #shadow-js { transform-box: fill-box; transform-origin: 50% 50%; will-change: transform; }

    /* 左钳 idle bob */
    #claw-left {
      transform-box: fill-box;
      transform-origin: center;
      animation: claw-bob 3.6s ease-in-out infinite;
    }
    @keyframes claw-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-0.6px); }
    }

    /* 右钳扶帽 7s */
    #claw-right {
      transform-origin: 24px 12px;
      animation: claw-fix 7s ease-in-out infinite;
    }
    @keyframes claw-fix {
      0%, 38%   { transform: rotate(0deg); }
      45%, 50%  { transform: translate(-3px, -6px) rotate(-90deg);  }
      55%       { transform: translate(-3px, -6px) rotate(-100deg); }
      58%       { transform: translate(-3px, -6px) rotate(-80deg);  }
      62%, 70%  { transform: translate(-3px, -6px) rotate(-90deg);  }  /* hold 扶帽 8% 不急回 */
      78%       { transform: translate(-1.5px, -3px) rotate(-45deg); }  /* 中间帧 边降边收 */
      85%, 100% { transform: rotate(0deg); }                            /* 慢慢放下 */
    }

    /* auto-blink 从 #eyes-js 迁移到 .eyes-blink-wrap，
       让 #eyes-js 留给 renderer rAF 写 inline style.transform */
    .eyes-blink-wrap {
      transform-box: fill-box;
      transform-origin: 15px 12px;
      animation: auto-blink 7.3s steps(1) infinite;
    }
    @keyframes auto-blink {
      0%, 17.9%    { transform: scaleY(1); }
      18%, 19%     { transform: scaleY(0.05); }
      19.1%, 66%   { transform: scaleY(1); }
      66.5%, 67.5% { transform: scaleY(0.05); }
      68%, 100%    { transform: scaleY(1); }
    }

    /* 腿步态 */
    #leg-1, #leg-2, #leg-3, #leg-4 { transform-box: fill-box; transform-origin: top center; }
    #leg-1 { animation: leg-step 7s linear infinite;          }
    #leg-3 { animation: leg-step 7s linear infinite;          }
    #leg-2 { animation: leg-step 7s linear infinite -0.245s;  }
    #leg-4 { animation: leg-step 7s linear infinite -0.245s;  }
    @keyframes leg-step {
      0%   { transform: rotate(0deg)   scaleY(1);   }
      7%   { transform: rotate(-25deg) scaleY(0.7); }
      14%  { transform: rotate(0deg)   scaleY(1);   }
      21%  { transform: rotate(-25deg) scaleY(0.7); }
      28%  { transform: rotate(0deg)   scaleY(1);   }
      72%  { transform: rotate(0deg)   scaleY(1);   }
      79%  { transform: rotate(-25deg) scaleY(0.7); }
      86%  { transform: rotate(0deg)   scaleY(1);   }
      93%  { transform: rotate(-25deg) scaleY(0.7); }
      100% { transform: rotate(0deg)   scaleY(1);   }
    }

    /* 帽子一次性掉落 */
    .hat-drop { animation: hat-drop 1.5s ease-out 1 forwards; }
    @keyframes hat-drop {
      0%   { transform: translateY(-15px); opacity: 0; }
      25%  { transform: translateY(-10px); opacity: 1; }
      75%  { transform: translateY(1px);   opacity: 1; }
      100% { transform: translateY(0);     opacity: 1; }
    }
    .hat-tilt {
      transform-origin: 14.5px 6px;
      animation: hat-tilt 4.2s ease-in-out infinite;
    }
    @keyframes hat-tilt {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(3deg); }
    }
    #hat-stars { animation: hat-stars 1.6s linear infinite; }
    @keyframes hat-stars {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ==================== 4.6s 魔法帽事故 sequence ==================== */
    /* 触发：accident class 添加到 wrapper，4 个通道 4.6s 同步播放 1 次后回到 idle */

    /* 帽子: anticipation tell → 抽气 → 爆胀盖头 → 内部 wobble → 收缩 undershoot bounce → settle
       origin 14.5px 8px = 帽底中心：scale 时帽底锁住，向上 + 向左右扩张盖住 body */
    .hat-engulf-wrap {
      transform-origin: 14.5px 8px;
      animation: accident-hat 4.6s cubic-bezier(0.4, 0, 0.6, 1) 1;
    }
    @keyframes accident-hat {
      0%, 4%      { transform: scale(1)    rotate(0deg);   }
      4.3%        { transform: scale(1.02) rotate(1.5deg); }  /* anticipation tell */
      6%          { transform: scale(1.02) rotate(-1.5deg);}
      9%          { transform: scale(0.96) rotate(0deg);   }  /* 抽气 squash */
      13%         { transform: scale(2.55) rotate(0deg);   }  /* 爆胀 overshoot */
      16%         { transform: scale(2.40) rotate(2deg);   }  /* settle 盖头 */
      22%         { transform: scale(2.50) rotate(-3deg);  }  /* wobble */
      30%         { transform: scale(2.45) rotate(2.5deg); }
      38%         { transform: scale(2.50) rotate(-2deg);  }
      45%         { transform: scale(2.45) rotate(0deg);   }
      48%         { transform: scale(0.92) rotate(0deg);   }  /* 收缩 undershoot */
      53%         { transform: scale(1.06) rotate(0deg);   }  /* bounce */
      56%, 100%   { transform: scale(1)    rotate(0deg);   }  /* settle = 0% ✅ */
    }

    /* body: 蜷缩 + 高频 shake → 解压回弹 → 头 wobble (晕) → 傲娇 1° spike → 收回
       origin 15px 18px = body 几何中心 (pivot=中心 = 主动挣扎而非钟摆) */
    .body-struggle-wrap {
      transform-origin: 15px 18px;
      animation: accident-body 4.6s cubic-bezier(0.4, 0, 0.6, 1) 1;
    }
    @keyframes accident-body {
      0%, 13%     { transform: translate(0, 0)        rotate(0deg) scale(1, 1);   }
      16%         { transform: translate(0, 1px)      scale(1, 0.95);   }  /* 压矮 */
      20%         { transform: translate(-1.5px, 0.8px) scale(0.97, 0.95); }  /* shake 12Hz */
      24%         { transform: translate(1.5px, 0.8px) scale(0.97, 0.95); }
      28%         { transform: translate(-1.2px, 0.9px) scale(0.96, 0.94); }
      32%         { transform: translate(1.2px, 0.9px) scale(0.96, 0.94); }
      37%         { transform: translate(-0.8px, 0.7px) scale(0.98, 0.96); }  /* 衰减 8Hz */
      42%         { transform: translate(0.8px, 0.7px) scale(0.98, 0.96); }
      47%         { transform: translate(0, 0.5px)    scale(0.99, 0.98); }
      53%         { transform: translate(0, -0.5px)   scale(1, 1.02);     }  /* 解压回弹 */
      57%         { transform: translate(0, 0)        rotate(0deg);       }
      60%         { transform: rotate(2deg);    }  /* 晕：头 wobble 0.6s/周期 */
      66%         { transform: rotate(-2deg);   }
      72%         { transform: rotate(1.5deg); }
      78%         { transform: rotate(-1.5deg);}
      84%         { transform: rotate(1deg);   }
      90%         { transform: rotate(0deg);   }
      95%         { transform: rotate(1deg);   }  /* 傲娇 spike */
      98%, 100%   { transform: rotate(0deg);   }
    }

    /* eyes: 静默 → 旋转 2 圈 (720°) → 一愣 → 大眨眼 squash → 复位 (720° = 视觉 0°)
       origin 15px 12px = 双眼连线中点 */
    .eyes-dizzy-wrap {
      transform-origin: 15px 12px;
      animation: accident-eyes 4.6s cubic-bezier(0.45, 0, 0.55, 1) 1;
    }
    @keyframes accident-eyes {
      0%, 57%     { transform: rotate(0deg)   scale(1, 1);     }
      60%         { transform: rotate(120deg) scale(1.05, 0.9);}  /* 加速 */
      66%         { transform: rotate(280deg) scale(0.95, 1.1);}
      72%         { transform: rotate(440deg) scale(1.05, 0.95);} /* 减速 */
      78%         { transform: rotate(600deg) scale(0.95, 1.05);}
      82%         { transform: rotate(680deg) scale(1, 1);     }
      86%         { transform: rotate(710deg) scale(1, 1);     }  /* 一愣 (5° 漂移) */
      89%         { transform: rotate(720deg) scale(1.15, 0.1);}  /* 大眨眼 squash */
      92%         { transform: rotate(720deg) scale(1, 1.12);  }
      95%, 100%   { transform: rotate(720deg) scale(1, 1);     }  /* 720 = 视觉 0 ✅ */
    }

    /* shadow: 帽子盖住期间阴影变大变淡（巨型帽子的阴影意象） */
    .shadow-engulf-wrap {
      transform-origin: 15px 24.5px;
      animation: accident-shadow 4.6s ease-in-out 1;
    }
    @keyframes accident-shadow {
      0%, 9%      { transform: scale(1);   opacity: 1;   }
      13%         { transform: scale(2.2); opacity: 0.4; }
      47%         { transform: scale(2.2); opacity: 0.4; }
      53%, 100%   { transform: scale(1);   opacity: 1;   }
    }
  </style>
  <g class="pet-scale-wrap" transform="translate(15 23) scale(0.7) translate(-15 -23)">

  <g id="shadow-js">
    <g class="shadow-engulf-wrap">
      <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.28"/>
    </g>
  </g>

  <g id="body-js">
    <g class="body-breathe">
      <g class="body-sway">
        <g class="body-struggle-wrap">

          <g id="leg-1"><rect x="8"  y="20" width="2" height="3" fill="#B95E40"/></g>
          <g id="leg-2"><rect x="11" y="20" width="2" height="3" fill="#B95E40"/></g>
          <g id="leg-3"><rect x="17" y="20" width="2" height="3" fill="#B95E40"/></g>
          <g id="leg-4"><rect x="20" y="20" width="2" height="3" fill="#B95E40"/></g>

          <g id="claw-left"><rect  x="4"  y="12" width="2" height="3" fill="#D97856"/></g>
          <g id="claw-right"><rect x="24" y="12" width="2" height="3" fill="#D97856"/></g>

          <g id="body">
            <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
            <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
            <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
          </g>
          <g id="body-highlight"><rect x="8" y="8" width="14" height="1" fill="#F3A98B"/></g>
          <g id="body-shadow-band"><rect x="8" y="18" width="14" height="1" fill="#B95E40"/></g>
          <g id="mouth"></g>

          <!-- 巫师帽：drop (一次性) → engulf (事故 scale) → tilt (idle 摆) → wizard-hat -->
          <g class="hat-drop">
            <g class="hat-engulf-wrap">
              <g class="hat-tilt">
                <g id="wizard-hat">
                  <g id="hat-cone" fill="#5865C8">
                    <rect x="10" y="-4" width="4"  height="1"/>
                    <rect x="9"  y="-3" width="6"  height="1"/>
                    <rect x="9"  y="-2" width="7"  height="1"/>
                    <rect x="11" y="-1" width="6"  height="1"/>
                    <rect x="10" y="0"  width="8"  height="1"/>
                    <rect x="10" y="1"  width="9"  height="1"/>
                    <rect x="9"  y="2"  width="11" height="1"/>
                    <rect x="9"  y="3"  width="11" height="1"/>
                  </g>
                  <g id="hat-fold" fill="#404CB0">
                    <rect x="11" y="-2" width="1" height="1"/>
                    <rect x="11" y="-1" width="1" height="1"/>
                  </g>
                  <g id="hat-stars" fill="#FFFFFF">
                    <rect x="13" y="-3" width="1" height="1"/>
                    <rect x="10" y="-2" width="1" height="1"/>
                    <rect x="14" y="-1" width="1" height="1"/>
                    <rect x="15" y="1"  width="1" height="1"/>
                    <rect x="11" y="2"  width="1" height="1"/>
                    <rect x="17" y="3"  width="1" height="1"/>
                  </g>
                  <g id="hat-band" fill="#2C2557">
                    <rect x="8" y="4" width="13" height="2"/>
                  </g>
                  <g id="hat-brim" fill="#6A70D8">
                    <rect x="4"  y="6" width="5"  height="2"/>
                    <rect x="9"  y="6" width="11" height="2"/>
                    <rect x="20" y="6" width="5"  height="2"/>
                  </g>
                </g>
              </g>
            </g>
          </g>

          <!-- 眼睛三层隔离：dizzy (CSS 旋转) → blink (CSS 眨) → eyes-js (renderer rAF) -->
          <g class="eyes-dizzy-wrap">
            <g class="eyes-blink-wrap">
              <g id="eyes-js">
                <g id="eye-left"><rect  x="10" y="10" width="2" height="4" fill="#111111"/></g>
                <g id="eye-right"><rect x="18" y="10" width="2" height="4" fill="#111111"/></g>
                <g id="pupil-left"><rect  x="10" y="10" width="1" height="1" fill="#FFFFFF"/></g>
                <g id="pupil-right"><rect x="18" y="10" width="1" height="1" fill="#FFFFFF"/></g>
              </g>
            </g>
          </g>

          <g id="eyes-doze" style="display:none">
            <rect x="10" y="12" width="2" height="1" fill="#111111"/>
            <rect x="18" y="12" width="2" height="1" fill="#111111"/>
          </g>

        </g>
      </g>
    </g>
  </g>

</g>
</svg>
