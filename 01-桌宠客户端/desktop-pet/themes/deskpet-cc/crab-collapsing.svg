<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-collapsing.svg  ·  倒下 (C 类过渡 1s, 站立 → splooted)
  ──────────────────────────────────────────────────────────────
  · 起点 = doze 末态 (squashed 站姿)
  · 终点 = sleeping 起态 (splooted scale 1.18, 0.71 translateY 3)
  · 必须 forwards (动画结束不回 0%)
  · 性格: 一节节失力, 屁股先着地 头再咚一下, 不带 rotate (pixel 锯齿)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 30 30"
     shape-rendering="crispEdges">

  <style>
    /* body: 重力加速曲线 (前慢后快), 末态 = splooted */
    .collapse-body {
      transform-origin: 15px 23px;
      animation: collapse-body 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) 1 forwards;
    }
    @keyframes collapse-body {
      0%    { transform: scale(1.05, 0.95) translate(0, 1px);  }  /* doze 末态 */
      10%   { transform: scale(1.06, 0.97) translate(0, 0.5px);}  /* anticipation 微抬 */
      35%   { transform: scale(1.08, 0.88) translate(-0.5px, 1.5px); }
      65%   { transform: scale(1.14, 0.78) translate(-1px, 2.5px);   }
      85%   { transform: scale(1.20, 0.69) translate(-1px, 3px);     }  /* over-squash */
      100%  { transform: scale(1.18, 0.71) translate(-1px, 3px);     }  /* = sleeping 起 */
    }

    .collapse-shadow {
      transform-origin: 15px 24.5px;
      animation: collapse-shadow 1s linear 1 forwards;
    }
    @keyframes collapse-shadow {
      0%    { transform: scaleX(1.02); opacity: 0.32; }
      35%   { transform: scaleX(1.08); opacity: 0.42; }
      65%   { transform: scaleX(1.14); opacity: 0.5;  }
      100%  { transform: scaleX(1.18); opacity: 0.55; }
    }

    /* 腿: 1 → 0.4 (一节节收) */
    .legs-fold {
      transform-origin: 15px 20px;
      animation: legs-fold 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) 1 forwards;
    }
    @keyframes legs-fold {
      0%    { transform: translateY(0)    scaleY(1);    }
      35%   { transform: translateY(-0.5px) scaleY(0.85);}
      65%   { transform: translateY(-1.5px) scaleY(0.55);}
      100%  { transform: translateY(-2px) scaleY(0.4);   }
    }

    /* 钳子摊到地面 */
    .collapse-claw-l { transform-origin: 5px 13px; animation: collapse-claw-l 1s ease-in 1 forwards; }
    .collapse-claw-r { transform-origin: 25px 13px; animation: collapse-claw-r 1s ease-in 1 forwards; }
    @keyframes collapse-claw-l {
      0%    { transform: translateY(1px)   rotate(-5deg);  }  /* doze 下垂态 */
      35%   { transform: translate(-1px, 1.5px) rotate(-8deg); }
      65%   { transform: translate(-2px, 2.5px) rotate(-10deg);}
      100%  { transform: translate(-2px, 3px)   rotate(-10deg);}
    }
    @keyframes collapse-claw-r {
      0%    { transform: translateY(1px)   rotate(5deg);  }
      35%   { transform: translate(1px, 1.5px)  rotate(8deg);  }
      65%   { transform: translate(2px, 2.5px)  rotate(10deg); }
      100%  { transform: translate(2px, 3px)    rotate(10deg); }
    }

    /* 眼睛: 半闭 → 闭紧 → 横划 (= sleeping 起) */
    .collapse-eyes {
      transform-box: fill-box;
      transform-origin: top left;
      animation: collapse-eyes 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) 1 forwards;
    }
    @keyframes collapse-eyes {
      0%    { transform: scaleY(0.5)  scaleX(1);    }  /* doze 半闭 */
      30%   { transform: scaleY(0.25) scaleX(1);    }
      60%   { transform: scaleY(0.1)  scaleX(1.15); }
      100%  { transform: scaleY(0.1)  scaleX(1.3);  }  /* = sleeping 横划 */
    }
  </style>

  <g class="collapse-shadow">
    <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.32"/>
  </g>

  <g class="collapse-body">

    <g class="legs-fold">
      <rect x="8"  y="20" width="2" height="3" fill="#B95E40"/>
      <rect x="11" y="20" width="2" height="3" fill="#B95E40"/>
      <rect x="17" y="20" width="2" height="3" fill="#B95E40"/>
      <rect x="20" y="20" width="2" height="3" fill="#B95E40"/>
    </g>

    <g class="collapse-claw-l"><rect x="4"  y="12" width="2" height="3" fill="#D97856"/></g>
    <g class="collapse-claw-r"><rect x="24" y="12" width="2" height="3" fill="#D97856"/></g>

    <g id="body">
      <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
      <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
      <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
    </g>
    <rect x="8" y="8"  width="14" height="1" fill="#F3A98B"/>
    <rect x="8" y="18" width="14" height="1" fill="#B95E40"/>

    <rect class="collapse-eyes" x="10" y="10" width="2" height="4" fill="#111111"/>
    <rect class="collapse-eyes" x="18" y="10" width="2" height="4" fill="#111111"/>

  </g>

</svg>
