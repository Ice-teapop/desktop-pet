<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-happy.svg  ·  LLM 任务完成
  · 保留 ^^ 笑眯眼 + 弹跳 + 钳举手 + 上扬嘴
  · 加 5 颗多彩粒子上飘 (黄/橙/粉/青/紫 错相)
  · 性格: "嘴硬强笑" - 克制庆祝, 不过度热烈
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 30 30"
     shape-rendering="crispEdges">

  <style>
    /* 弹跳 1.6s, 跟粒子周期同步 */
    .body-bounce { animation: happy-bounce 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; transform-origin: 15px 23px; }
    @keyframes happy-bounce {
      0%, 100% { transform: translateY(0)    scaleY(1);     }
      35%      { transform: translateY(-2px) scaleY(1.06);  }
      60%      { transform: translateY(0)    scaleY(0.94);  }
      75%      { transform: translateY(-0.5px) scaleY(1.02);}
    }
    #shadow { transform-origin: 15px 24.5px; animation: happy-shadow 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
    @keyframes happy-shadow {
      0%, 100% { transform: scaleX(1);    opacity: 1;   }
      35%      { transform: scaleX(0.75); opacity: 0.5; }
      60%      { transform: scaleX(1.1);  opacity: 1;   }
    }
    .claw-cheer { animation: claw-cheer 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; transform-box: fill-box; transform-origin: top center; }
    @keyframes claw-cheer {
      0%, 100% { transform: translateY(0); }
      35%      { transform: translateY(-1.5px) rotate(-10deg); }
      60%      { transform: translateY(0); }
    }

    /* 庆祝粒子 5 颗错相上飘 — 周期 1.6s 同步 bounce */
    .particle { opacity: 0; }
    .p1 { animation: particle-rise 1.6s ease-out infinite;          }
    .p2 { animation: particle-rise 1.6s ease-out infinite -0.32s;   }
    .p3 { animation: particle-rise 1.6s ease-out infinite -0.64s;   }
    .p4 { animation: particle-rise 1.6s ease-out infinite -0.96s;   }
    .p5 { animation: particle-rise 1.6s ease-out infinite -1.28s;   }
    @keyframes particle-rise {
      0%   { opacity: 0;   transform: translateY(0)    scale(0.5); }
      15%  { opacity: 1;   transform: translateY(-1px) scale(1.3); }  /* pop appear with overshoot */
      30%  { opacity: 1;   transform: translateY(-3px) scale(1);   }
      80%  { opacity: 0.7; transform: translateY(-7px) scale(0.8); }
      100% { opacity: 0;   transform: translateY(-9px) scale(0.4); }
    }
  </style>

  <g id="shadow">
    <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.28"/>
  </g>

  <g class="body-bounce">

    <rect x="8"  y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="11" y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="17" y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="20" y="20" width="2" height="3" fill="#B95E40"/>

    <g class="claw-cheer" style="transform-origin: 5px 12px;"><rect x="4"  y="12" width="2" height="3" fill="#D97856"/></g>
    <g class="claw-cheer" style="transform-origin: 25px 12px;"><rect x="24" y="12" width="2" height="3" fill="#D97856"/></g>

    <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
    <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
    <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
    <rect x="8" y="8"  width="14" height="1"  fill="#F3A98B"/>
    <rect x="8" y="18" width="14" height="1"  fill="#B95E40"/>

    <!-- ^^ 笑眯眼 -->
    <g fill="#111111">
      <rect x="11" y="11" width="1" height="1"/>
      <rect x="10" y="12" width="1" height="1"/>
      <rect x="12" y="12" width="1" height="1"/>
      <rect x="19" y="11" width="1" height="1"/>
      <rect x="18" y="12" width="1" height="1"/>
      <rect x="20" y="12" width="1" height="1"/>
    </g>

    <!-- 上扬嘴角 -->
    <g fill="#111111">
      <rect x="13" y="16" width="4" height="1"/>
      <rect x="12" y="15" width="1" height="1"/>
      <rect x="17" y="15" width="1" height="1"/>
    </g>

  </g>

  <!-- 5 颗多彩庆祝粒子 (头顶散开扇形, 上飘后消失) -->
  <g id="particles">
    <rect class="particle p1" x="6"  y="5" width="1" height="1" fill="#FFD700"/>  <!-- 金 左外 -->
    <rect class="particle p2" x="11" y="4" width="1" height="1" fill="#FF8C00"/>  <!-- 橙 左内 -->
    <rect class="particle p3" x="15" y="3" width="1" height="1" fill="#FF69B4"/>  <!-- 粉 中 (最高) -->
    <rect class="particle p4" x="19" y="4" width="1" height="1" fill="#87CEEB"/>  <!-- 青 右内 -->
    <rect class="particle p5" x="23" y="5" width="1" height="1" fill="#DDA0DD"/>  <!-- 紫 右外 -->
  </g>

</svg>
