<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-error.svg  ·  LLM 错误
  · 保留 X X 眼 + 身体后仰 + 高频抖动
  · 加老 Clawd error 特效:
    - 头顶 3 颗烟雾 puff 灰色错相上飘 (体力崩溃感)
    - 右钳"扇风"小幅 rotate 0.4s (用扇子自救)
    - error-flash 整体 opacity 0.8s 轻微脉动
  · 性格: "傲娇否认 — 这不可能"
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-7.5 -7.5 45 45"
     shape-rendering="crispEdges">

  <style>
    /* 高频抖动 (1.2s 一周期, 8 次 shake) */
    .body-shake { animation: body-shake 1.2s linear infinite; transform-origin: 15px 23px; }
    @keyframes body-shake {
      0%, 100% { transform: translateX(0)    rotate(-3deg); }
      12%      { transform: translateX(-0.8px) rotate(-3deg); }
      25%      { transform: translateX(0.8px)  rotate(-3deg); }
      37%      { transform: translateX(-0.6px) rotate(-3deg); }
      50%      { transform: translateX(0.6px)  rotate(-3deg); }
      62%      { transform: translateX(-0.4px) rotate(-3deg); }
      75%      { transform: translateX(0.4px)  rotate(-3deg); }
      87%      { transform: translateX(-0.2px) rotate(-3deg); }
    }
    #shadow { transform-origin: 15px 24.5px; animation: shadow-shake 1.2s linear infinite; }
    @keyframes shadow-shake {
      0%, 100% { transform: translateX(0); opacity: 1; }
      50%      { transform: translateX(0.4px); opacity: 0.7; }
    }

    /* 右钳扇风 (老 Clawd error 自救动作, 0.4s 来回扇) */
    .arm-fan { transform-origin: 25px 13px; animation: fan-self 0.4s ease-in-out alternate infinite; }
    @keyframes fan-self {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(-45deg); }
    }

    /* 烟雾 3 颗错相上飘 (灰色 1×1, 从头顶冒出) */
    .smoke { opacity: 0; }
    .sm1 { animation: puff-smoke 3s ease-out infinite;       }
    .sm2 { animation: puff-smoke 3s ease-out infinite -1s;   }
    .sm3 { animation: puff-smoke 3s ease-out infinite -2s;   }
    @keyframes puff-smoke {
      0%   { opacity: 0;   transform: translate(0, 0)    scale(0.5); }
      20%  { opacity: 0.6; transform: translate(0, -2px) scale(1);   }
      60%  { opacity: 0.5; transform: translate(1px, -6px) scale(1.4);}
      100% { opacity: 0;   transform: translate(2px, -10px) scale(1.8);}
    }

    /* 整体 error-flash (0.8s 轻微 opacity 脉动) */
    .error-flash { animation: error-flash 0.8s ease-in-out infinite; }
    @keyframes error-flash {
      0%, 100% { opacity: 1;    }
      50%      { opacity: 0.85; }
    }

    /* 红色感叹号 ! 浮现隐去 (周期 1.4s, 跟 0.8s/1.2s 都互质 7:4 / 7:6) */
    .error-bang {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: bang-pulse 1.4s ease-in-out infinite;
    }
    @keyframes bang-pulse {
      0%, 100% { opacity: 0;   transform: scale(0.7); }  /* hide */
      15%      { opacity: 0.6; transform: scale(0.9); }  /* fade in start */
      25%      { opacity: 1;   transform: scale(1.2); }  /* pop overshoot */
      40%      { opacity: 1;   transform: scale(1);   }  /* hold */
      65%      { opacity: 1;   transform: scale(1);   }
      80%      { opacity: 0.5; transform: scale(0.85);}  /* fade out */
    }
  </style>

  <g id="shadow">
    <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.28"/>
  </g>

  <g class="error-flash">
  <g class="body-shake">

    <rect x="8"  y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="11" y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="17" y="20" width="2" height="3" fill="#B95E40"/>
    <rect x="20" y="20" width="2" height="3" fill="#B95E40"/>

    <rect x="4"  y="12" width="2" height="3" fill="#D97856"/>

    <!-- 右钳扇风 -->
    <g class="arm-fan"><rect x="24" y="12" width="2" height="3" fill="#D97856"/></g>

    <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
    <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
    <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
    <rect x="8" y="8"  width="14" height="1"  fill="#F3A98B"/>
    <rect x="8" y="18" width="14" height="1"  fill="#B95E40"/>

    <!-- X X 眼 -->
    <g fill="#111111">
      <rect x="10" y="10" width="1" height="1"/>
      <rect x="11" y="11" width="1" height="1"/>
      <rect x="10" y="12" width="1" height="1"/>
      <rect x="12" y="10" width="1" height="1"/>
      <rect x="12" y="12" width="1" height="1"/>
      <rect x="18" y="10" width="1" height="1"/>
      <rect x="19" y="11" width="1" height="1"/>
      <rect x="18" y="12" width="1" height="1"/>
      <rect x="20" y="10" width="1" height="1"/>
      <rect x="20" y="12" width="1" height="1"/>
    </g>

    <!-- 倒嘴 -->
    <g fill="#111111">
      <rect x="13" y="16" width="4" height="1"/>
      <rect x="12" y="17" width="1" height="1"/>
      <rect x="17" y="17" width="1" height="1"/>
    </g>

  </g>
  </g>

  <!-- 头顶烟雾 3 颗 (灰色像素 puff, 错相 0/-1/-2s) -->
  <g id="smoke-puffs">
    <g class="smoke sm1" fill="#B0BEC5"><rect x="13" y="6" width="2" height="2"/></g>
    <g class="smoke sm2" fill="#CFD8DC"><rect x="15" y="5" width="2" height="2"/></g>
    <g class="smoke sm3" fill="#90A4AE"><rect x="14" y="7" width="2" height="2"/></g>
  </g>

  <!-- 红色感叹号 ! 浮现隐去 (警告标 - 头顶居中) -->
  <g class="error-bang" fill="#FF3344">
    <rect x="14" y="1" width="1" height="3"/>  <!-- 主线竖条 -->
    <rect x="14" y="5" width="1" height="1"/>  <!-- 底点 -->
  </g>

</svg>
