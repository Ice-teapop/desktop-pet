<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-idle-follow.svg  ·  搬运自老 clawd-idle-follow.svg 完整结构
  · 严格照搬: 单层嵌套 + eye-blink inner + 钳子静态 + transition: transform on hooks
  · Hook ID: #shadow-js / #body-js / #eyes-js
  · rAF inline style.transform 不跟 CSS animation 冲突 (blink 在 inner wrapper)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-7.5 -7.5 45 45"
     shape-rendering="crispEdges">

  <defs>
    <style>
      .breathe-anim {
        transform-origin: 15px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .eyes-blink {
        transform-origin: 15px 12px;
        animation: eye-blink 4s infinite ease-in-out;
      }
      #eyes-js, #body-js {
        transition: transform 0.2s ease-out;
        will-change: transform;
      }
      #body-js { transform-origin: 15px 13px; }
      /* shadow:
         · 无 CSS animation —— animation 跟 inline style.transform 同 property
           抢占, animation 永远赢, 让 App.tsx rAF 写入视觉静默 (这是历史 4 次
           修法失败的根因).
         · 无 transition —— rAF 60Hz 写入本就连续平滑, 0.2s 缓动把每帧新目标
           被低通滤波到上一帧 30%, 拖尾让用户看不出实时变化.
         · transform-box: fill-box —— 让 transform-origin 相对自己 bbox 中心
           (15, 24.5 是 rect 几何中心), 避开 outer pet-scale-wrap 缩放对
           origin 不共变导致的 scaleX 中心漂移 (Bug D).
         · will-change: transform 仍保留 (GPU 合成层). */
      #shadow-js {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        will-change: transform;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5%            { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <g class="pet-scale-wrap" transform="translate(15 23) scale(0.7) translate(-15 -23)">

    <g id="shadow-js">
      <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.4"/>
    </g>

    <g id="legs" fill="#B95E40">
      <rect x="8"  y="20" width="2" height="3"/>
      <rect x="11" y="20" width="2" height="3"/>
      <rect x="17" y="20" width="2" height="3"/>
      <rect x="20" y="20" width="2" height="3"/>
    </g>

    <g id="body-js">
      <g class="breathe-anim">

        <rect x="4"  y="12" width="2" height="3" fill="#D97856"/>
        <rect x="24" y="12" width="2" height="3" fill="#D97856"/>

        <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
        <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
        <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
        <rect x="8" y="8"  width="14" height="1"  fill="#F3A98B"/>
        <rect x="8" y="18" width="14" height="1"  fill="#B95E40"/>

        <g id="eyes-js">
          <g class="eyes-blink">
            <rect x="10" y="10" width="2" height="4" fill="#111111"/>
            <rect x="18" y="10" width="2" height="4" fill="#111111"/>
            <rect x="10" y="10" width="1" height="1" fill="#FFFFFF"/>
            <rect x="18" y="10" width="1" height="1" fill="#FFFFFF"/>
          </g>
        </g>

      </g>
    </g>

  </g>
</svg>
