<?xml version="1.0" encoding="UTF-8"?>
<!--
  crab-idle-follow.svg  ·  DeskPet idle (含 renderer 眼跟随 hook)
  ──────────────────────────────────────────────────────────────
  · 5 个异步动画通道（互质周期）= "灵动"感
  · breathe 4.8s · shadow 5.3s · claw-bob 3.6s · body-sway 6.7s · auto-blink 7.3s
  · Hook ID: #shadow-js / #body-js / #eyes-js / #eyes-doze
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 30 30"
     shape-rendering="crispEdges">

  <title>crab-idle-follow</title>

  <style>
    /* —— 1. 身体呼吸：非对称（吸快呼慢）+ scaleY 微 squash —— */
    .body-breathe { animation: crab-breathe 4.8s ease-in-out infinite; transform-origin: 15px 18px; }
    @keyframes crab-breathe {
      0%   { transform: translateY(0)    scaleY(1);    }
      30%  { transform: translateY(-1px) scaleY(1.04); }  /* 吸气：快速鼓起 */
      45%  { transform: translateY(-1px) scaleY(1.04); }  /* 顶点保持 */
      100% { transform: translateY(0)    scaleY(1);    }  /* 呼气：慢回 */
    }

    /* —— 2. 身体水平微摆：跟 breathe 完全不同周期 —— */
    .body-sway { animation: crab-sway 6.7s ease-in-out infinite; transform-origin: 15px 18px; }
    @keyframes crab-sway {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-0.3px); }
      75%      { transform: translateX(0.3px); }
    }

    /* —— 3. 阴影：周期 5.3s（跟 breathe 错相）—— */
    #shadow-js {
      transform-origin: 15px 24.5px;
      animation: crab-shadow 5.3s ease-in-out infinite;
    }
    @keyframes crab-shadow {
      0%, 100% { transform: scaleX(1);    opacity: 1; }
      50%      { transform: scaleX(0.85); opacity: 0.6; }
    }

    /* —— 4. 钳子轻微上下 bob：周期 3.6s（最快通道）—— */
    #claw-left, #claw-right {
      transform-box: fill-box;
      transform-origin: center;
    }
    #claw-left  { animation: claw-bob 3.6s ease-in-out infinite;        }
    #claw-right { animation: claw-bob 3.6s ease-in-out infinite -1.8s;  }  /* 左右反相 */
    @keyframes claw-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-0.6px); }
    }

    /* —— 5. 自动眨眼：周期 7.3s 内 2 次不等间距眨 —— */
    #eyes-js {
      transform-box: fill-box;
      transform-origin: 15px 12px;
      animation: auto-blink 7.3s steps(1) infinite;
    }
    @keyframes auto-blink {
      0%, 17.9%   { transform: scaleY(1); }
      18%, 19%    { transform: scaleY(0.05); }  /* 第 1 眨 */
      19.1%, 66%  { transform: scaleY(1); }
      66.5%, 67.5%{ transform: scaleY(0.05); }  /* 第 2 眨 */
      68%, 100%   { transform: scaleY(1); }
    }

    /* —— 6. 腿轻微步态错相 —— */
    #leg-1, #leg-2, #leg-3, #leg-4 {
      transform-box: fill-box;
      transform-origin: top center;
    }
    #leg-1 { animation: leg-bob 1.4s ease-in-out infinite;          }
    #leg-2 { animation: leg-bob 1.6s ease-in-out infinite -0.30s;   }
    #leg-3 { animation: leg-bob 1.5s ease-in-out infinite -0.60s;   }
    #leg-4 { animation: leg-bob 1.7s ease-in-out infinite -0.90s;   }
    @keyframes leg-bob {
      0%, 100% { transform: translateY(0)     scaleY(1);   }
      50%      { transform: translateY(-0.5px) scaleY(0.95); }
    }
  </style>

  <!-- ═══════════ Shadow group ═══════════ -->
  <g id="shadow-js">
    <rect x="9" y="24" width="12" height="1" fill="#000000" opacity="0.28"/>
  </g>

  <!-- ═══════════ Body group (renderer 写 style.transform 这一层) ═══════════ -->
  <g id="body-js">
    <!-- breathe 在 wrap 上，不跟 renderer inline transform 冲突 -->
    <g class="body-breathe">
      <g class="body-sway">

        <g id="leg-1"><rect x="8"  y="20" width="2" height="3" fill="#B95E40"/></g>
        <g id="leg-2"><rect x="11" y="20" width="2" height="3" fill="#B95E40"/></g>
        <g id="leg-3"><rect x="17" y="20" width="2" height="3" fill="#B95E40"/></g>
        <g id="leg-4"><rect x="20" y="20" width="2" height="3" fill="#B95E40"/></g>

        <g id="claw-left"><rect  x="4"  y="12" width="2" height="3" fill="#D97856"/></g>
        <g id="claw-right"><rect x="24" y="12" width="2" height="3" fill="#D97856"/></g>

        <g id="body">
          <rect x="7" y="7"  width="16" height="1"  fill="#D97856"/>
          <rect x="6" y="8"  width="18" height="11" fill="#D97856"/>
          <rect x="7" y="19" width="16" height="1"  fill="#D97856"/>
        </g>
        <g id="body-highlight">
          <rect x="8" y="8" width="14" height="1" fill="#F3A98B"/>
        </g>
        <g id="body-shadow-band">
          <rect x="8" y="18" width="14" height="1" fill="#B95E40"/>
        </g>
        <g id="mouth"></g>

        <g id="eyes-js">
          <g id="eye-left"><rect  x="10" y="10" width="2" height="4" fill="#111111"/></g>
          <g id="eye-right"><rect x="18" y="10" width="2" height="4" fill="#111111"/></g>
          <g id="pupil-left"><rect  x="10" y="10" width="1" height="1" fill="#FFFFFF"/></g>
          <g id="pupil-right"><rect x="18" y="10" width="1" height="1" fill="#FFFFFF"/></g>
        </g>

        <g id="eyes-doze" style="display:none">
          <rect x="10" y="12" width="2" height="1" fill="#111111"/>
          <rect x="18" y="12" width="2" height="1" fill="#111111"/>
        </g>

      </g>
    </g>
  </g>

</svg>
