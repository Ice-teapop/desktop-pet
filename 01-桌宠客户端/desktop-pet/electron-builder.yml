appId: com.deskpet.desktop-pet
# productName 单一来源在 package.json —— 这里删掉避免 drift（改 app 名时只改一处）
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  # Swift binary 必须可执行 → 不进 asar，直接进 .app/Contents/Resources/
  - from: resources/frontmost-listener
    to: frontmost-listener
win:
  executableName: desktop-pet
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.utilities
  # LSUIElement=true → 不在 dock 显示，只在状态栏（菜单条托盘）显示 —— 桌宠应用要的就是这种
  extendInfo:
    LSUIElement: true
    NSHumanReadableCopyright: © 2026 han · DeskPet
  # dev build 跳过 codesign（避开「resource fork detritus」+ 不需要 Apple Developer 证书）。
  # 首次启动 Gatekeeper 会拦：右键 .app → 打开 → 允许。
  # 上架前打开签名：identity 改成你的 Developer ID，notarize 设 true。
  identity: null
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
