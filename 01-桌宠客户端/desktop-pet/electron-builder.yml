appId: com.deskpet.desktop-pet
# productName 单一来源在 package.json —— 这里删掉避免 drift（改 app 名时只改一处）
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  # Swift binary 必须可执行 → 不进 asar，直接进 .app/Contents/Resources/
  - from: resources/frontmost-listener
    to: frontmost-listener
win:
  executableName: desktop-pet
  target:
    - target: nsis
      arch:
        - x64
        - arm64
mac:
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.utilities
  # LSUIElement=true → 不在 dock 显示，只在状态栏（菜单条托盘）显示 —— 桌宠应用要的就是这种
  extendInfo:
    LSUIElement: true
    NSHumanReadableCopyright: © 2026 han · DeskPet
  # dev build 跳过 codesign（避开「resource fork detritus」+ 不需要 Apple Developer 证书）。
  # 首次启动 Gatekeeper 会拦：右键 .app → 打开 → 允许。
  # 上架前打开签名：identity 改成你的 Developer ID，notarize 设 true。
  identity: null
  notarize: false
  # M6 Phase 1：临时只出 zip，跳过 dmg。
  # 原因：electron-builder 25 + dmg-builder v1.2.0 + macOS Sequoia hdiutil 输出 plist
  # 格式被 dmgbuild 当成 InvalidFile 抛 plistlib.InvalidFileException。已知 upstream
  # bug，等修复或换 dmg-license fork 再开。zip 用户体验只多一步解压，不阻塞 Phase 1。
  target:
    - target: zip
      arch:
        - arm64
        - x64
# dmg:
#   artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  # 删 snap — 需 Snap Store credentials (snapcraft login + ~/.config/snapcraft).
  # AppImage 在多数 distro 双击即开; deb 在 Ubuntu / Debian apt install 即可.
  maintainer: han
  category: Utility
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
deb:
  artifactName: ${name}-${version}_${arch}.${ext}
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
# M6 Phase 1：publish 到 GitHub Releases。
# - 不签名 / 不公证（identity:null + notarize:false 上面已设）—— user 首次打开
#   右键-打开 bypass Gatekeeper
# - 不依赖 electron-updater（Phase 1 不做 auto-update）
# - 用法（手动 release）：
#     npm run build:mac
#     → dist/DeskPet-0.0.1-arm64.dmg 等产物
#     → 手动上传到 https://github.com/Ice-teapop/desktop-pet/releases
# - 用法（自动 release）：
#     env GH_TOKEN=<github personal access token> npm run build:mac -- --publish always
#     → 自动建 draft release + 上传 dmg
publish:
  provider: github
  owner: Ice-teapop
  repo: desktop-pet
  releaseType: draft
